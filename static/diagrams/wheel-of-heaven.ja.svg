  <circle cx="127.2" cy="127.2" r="5" class="dg-accent--fill"/>
  <text x="116.6" y="113.6" text-anchor="middle" class="dg-label--accent" font-size="10" font-weight="600">現在地</text>
  <text x="116.6" y="125.6" text-anchor="middle" class="dg-label--accent" font-size="8.5">西暦1950年</text>
  <path d="M 210.0 45.9 A 232 232 0 0 1 330.0 45.9" fill="none" class="dg-accent" stroke-width="1.6"/>
  <path d="M 337.8 48.1 L 319.3 38.2 L 317.2 48.0 Z" class="dg-accent--fill"/>
  <text x="270" y="16" text-anchor="middle" class="dg-label--muted" font-size="10.5">時代が進む →</text>
  <text x="270" y="248" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">Wheel of</text>
  <text x="270" y="266" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">Heaven</text>
  <text x="270" y="287" text-anchor="middle" class="dg-label--muted" font-size="11">同盟のプロジェクトの</text>
  <text x="270" y="301" text-anchor="middle" class="dg-label--muted" font-size="11">十二の時代</text>
  <text x="270" y="590" text-anchor="middle" class="dg-label--muted" font-size="11">各時代 ≈ 2,160年 · 一周 ≈ 一つの大年</text>
</svg>
