<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="wh-t wh-d">
  <title id="wh-t">Wheel of Heaven ——プロジェクトの十二の歳差時代</title>
  <desc id="wh-d">約2,160年の十二の歳差時代を、同盟のプロジェクトの諸段階として読み解いたもので、外縁に各時代の境界年を記します。山羊座の時代(紀元前約21,810年、プロジェクト開始)から、獅子座(人類創造)、蟹座(エデン)、双子座(洪水)、牡牛座(バベル)、牡羊座(預言者たち)、魚座(福音書)を経て、現在のみずがめ座の時代(西暦1950年から)に至ります。</desc>
  <circle cx="270" cy="270" r="202" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="270" cy="270" r="112" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="299.0" y1="161.8" x2="322.3" y2="74.9"/>
    <line x1="349.2" y1="190.8" x2="412.8" y2="127.2"/>
    <line x1="378.2" y1="241.0" x2="465.1" y2="217.7"/>
    <line x1="378.2" y1="299.0" x2="465.1" y2="322.3"/>
    <line x1="349.2" y1="349.2" x2="412.8" y2="412.8"/>
    <line x1="299.0" y1="378.2" x2="322.3" y2="465.1"/>
    <line x1="241.0" y1="378.2" x2="217.7" y2="465.1"/>
    <line x1="190.8" y1="349.2" x2="127.2" y2="412.8"/>
    <line x1="161.8" y1="299.0" x2="74.9" y2="322.3"/>
    <line x1="161.8" y1="241.0" x2="74.9" y2="217.7"/>
    <line x1="190.8" y1="190.8" x2="127.2" y2="127.2"/>
    <line x1="241.0" y1="161.8" x2="217.7" y2="74.9"/>
  </g>
  <g text-anchor="middle">
    <text x="270.0" y="104.0" class="dg-label" font-size="12">山羊座</text>
    <text x="353.0" y="126.2" class="dg-label" font-size="12">射手座</text>
    <text x="413.8" y="187.0" class="dg-label" font-size="12">蠍座</text>
    <text x="436.0" y="270.0" class="dg-label" font-size="12">天秤座</text>
    <text x="413.8" y="353.0" class="dg-label" font-size="12">乙女座</text>
    <text x="353.0" y="413.8" class="dg-label" font-size="12">獅子座</text>
    <text x="353.0" y="427.8" class="dg-label--muted" font-size="9.5">人類創造</text>
    <text x="270.0" y="436.0" class="dg-label" font-size="12">蟹座</text>
    <text x="270.0" y="450.0" class="dg-label--muted" font-size="9.5">エデン</text>
    <text x="187.0" y="413.8" class="dg-label" font-size="12">双子座</text>
    <text x="187.0" y="427.8" class="dg-label--muted" font-size="9.5">洪水</text>
    <text x="126.2" y="353.0" class="dg-label" font-size="12">牡牛座</text>
    <text x="126.2" y="367.0" class="dg-label--muted" font-size="9.5">バベル</text>
    <text x="104.0" y="270.0" class="dg-label" font-size="12">牡羊座</text>
    <text x="104.0" y="284.0" class="dg-label--muted" font-size="9.5">預言者</text>
    <text x="126.2" y="187.0" class="dg-label" font-size="12">魚座</text>
    <text x="126.2" y="201.0" class="dg-label--muted" font-size="9.5">福音書</text>
    <text x="187.0" y="126.2" class="dg-label--accent" font-size="12" font-weight="600">みずがめ座</text>
  </g>
  <g text-anchor="middle">
    <text x="326.2" y="63.4" class="dg-label--muted" font-size="8">紀元前1.97万年</text>
    <text x="423.4" y="119.6" class="dg-label--muted" font-size="8">紀元前1.75万年</text>
