  <use href="#z-virgo" x="371.5" y="132.0" width="22.0" height="22.0" class="dg-glyph"/>
  <text x="382.5" y="110.0" text-anchor="start" class="dg-label" font-size="11" transform="rotate(-38 382.5 110.0)">處女座</text>
