  <text x="597.5" y="110.0" text-anchor="start" class="dg-label" font-size="11" transform="rotate(-38 597.5 110.0)">雙子座</text>
  <text x="597.5" y="180.0" text-anchor="end" class="dg-label--muted" font-size="10" transform="rotate(-38 597.5 180.0)">大洪水</text>
  <rect x="633.3" y="118.0" width="71.7" height="50.0" class="dg-surface dg-muted" stroke-width="1"/>
