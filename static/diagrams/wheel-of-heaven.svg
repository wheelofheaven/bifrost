<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="wh-t wh-d">
  <title id="wh-t">The Wheel of Heaven — twelve precessional ages of the project</title>
  <desc id="wh-d">The twelve ~2,160-year precessional ages read as phases of the alliance's project, with boundary years marked around the rim: from the Age of Capricorn (~21,810 BCE, project opening) through Leo (humans made), Cancer (Eden), Gemini (the Flood), Taurus (Babel), Aries (the prophets), Pisces (the gospels), to the current Age of Aquarius (from 1950 CE).</desc>
  <circle cx="270" cy="270" r="202" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="270" cy="270" r="112" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="299.0" y1="161.8" x2="322.3" y2="74.9"/>
    <line x1="349.2" y1="190.8" x2="412.8" y2="127.2"/>
    <line x1="378.2" y1="241.0" x2="465.1" y2="217.7"/>
    <line x1="378.2" y1="299.0" x2="465.1" y2="322.3"/>
    <line x1="349.2" y1="349.2" x2="412.8" y2="412.8"/>
    <line x1="299.0" y1="378.2" x2="322.3" y2="465.1"/>
    <line x1="241.0" y1="378.2" x2="217.7" y2="465.1"/>
    <line x1="190.8" y1="349.2" x2="127.2" y2="412.8"/>
    <line x1="161.8" y1="299.0" x2="74.9" y2="322.3"/>
    <line x1="161.8" y1="241.0" x2="74.9" y2="217.7"/>
    <line x1="190.8" y1="190.8" x2="127.2" y2="127.2"/>
    <line x1="241.0" y1="161.8" x2="217.7" y2="74.9"/>
  </g>
  <g text-anchor="middle">
    <text x="270.0" y="104.0" class="dg-label" font-size="12">Capricorn</text>
    <text x="353.0" y="126.2" class="dg-label" font-size="12">Sagittarius</text>
    <text x="413.8" y="187.0" class="dg-label" font-size="12">Scorpio</text>
    <text x="436.0" y="270.0" class="dg-label" font-size="12">Libra</text>
    <text x="413.8" y="353.0" class="dg-label" font-size="12">Virgo</text>
    <text x="353.0" y="413.8" class="dg-label" font-size="12">Leo</text>
    <text x="353.0" y="427.8" class="dg-label--muted" font-size="9.5">humans made</text>
    <text x="270.0" y="436.0" class="dg-label" font-size="12">Cancer</text>
    <text x="270.0" y="450.0" class="dg-label--muted" font-size="9.5">Eden</text>
    <text x="187.0" y="413.8" class="dg-label" font-size="12">Gemini</text>
    <text x="187.0" y="427.8" class="dg-label--muted" font-size="9.5">the Flood</text>
    <text x="126.2" y="353.0" class="dg-label" font-size="12">Taurus</text>
    <text x="126.2" y="367.0" class="dg-label--muted" font-size="9.5">Babel</text>
    <text x="104.0" y="270.0" class="dg-label" font-size="12">Aries</text>
    <text x="104.0" y="284.0" class="dg-label--muted" font-size="9.5">the prophets</text>
    <text x="126.2" y="187.0" class="dg-label" font-size="12">Pisces</text>
    <text x="126.2" y="201.0" class="dg-label--muted" font-size="9.5">the gospels</text>
    <text x="187.0" y="126.2" class="dg-label--accent" font-size="12" font-weight="600">Aquarius</text>
  </g>
  <g text-anchor="middle">
    <text x="326.2" y="63.4" class="dg-label--muted" font-size="8">19.7k BCE</text>
    <text x="423.4" y="119.6" class="dg-label--muted" font-size="8">17.5k BCE</text>
    <text x="479.6" y="216.8" class="dg-label--muted" font-size="8">15.3k BCE</text>
    <text x="479.6" y="329.2" class="dg-label--muted" font-size="8">13.2k BCE</text>
    <text x="423.4" y="426.4" class="dg-label--muted" font-size="8">11.0k BCE</text>
    <text x="326.2" y="482.6" class="dg-label--muted" font-size="8">8.85k BCE</text>
