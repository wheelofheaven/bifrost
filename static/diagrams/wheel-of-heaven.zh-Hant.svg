<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="wh-t wh-d">
  <title id="wh-t">天輪 —— 計畫的十二個歲差時代</title>
  <desc id="wh-d">這十二個各約 2,160 年的歲差時代,被讀為聯盟計畫的各個階段,邊界年份標示於輪緣:從摩羯座時代(約公元前 21,810 年,計畫開啟),歷經獅子座(人類受造)、巨蟹座(伊甸園)、雙子座(大洪水)、金牛座(巴別塔)、白羊座(先知)、雙魚座(福音書),直至當前的水瓶座時代(自公元 1950 年起)。</desc>
  <circle cx="270" cy="270" r="202" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="270" cy="270" r="112" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="299.0" y1="161.8" x2="322.3" y2="74.9"/>
    <line x1="349.2" y1="190.8" x2="412.8" y2="127.2"/>
    <line x1="378.2" y1="241.0" x2="465.1" y2="217.7"/>
    <line x1="378.2" y1="299.0" x2="465.1" y2="322.3"/>
    <line x1="349.2" y1="349.2" x2="412.8" y2="412.8"/>
    <line x1="299.0" y1="378.2" x2="322.3" y2="465.1"/>
    <line x1="241.0" y1="378.2" x2="217.7" y2="465.1"/>
    <line x1="190.8" y1="349.2" x2="127.2" y2="412.8"/>
    <line x1="161.8" y1="299.0" x2="74.9" y2="322.3"/>
    <line x1="161.8" y1="241.0" x2="74.9" y2="217.7"/>
    <line x1="190.8" y1="190.8" x2="127.2" y2="127.2"/>
    <line x1="241.0" y1="161.8" x2="217.7" y2="74.9"/>
  </g>
  <g text-anchor="middle">
    <text x="270.0" y="104.0" class="dg-label" font-size="12">摩羯座</text>
    <text x="353.0" y="126.2" class="dg-label" font-size="12">射手座</text>
    <text x="413.8" y="187.0" class="dg-label" font-size="12">天蠍座</text>
    <text x="436.0" y="270.0" class="dg-label" font-size="12">天秤座</text>
    <text x="413.8" y="353.0" class="dg-label" font-size="12">處女座</text>
    <text x="353.0" y="413.8" class="dg-label" font-size="12">獅子座</text>
    <text x="353.0" y="427.8" class="dg-label--muted" font-size="9.5">人類受造</text>
    <text x="270.0" y="436.0" class="dg-label" font-size="12">巨蟹座</text>
    <text x="270.0" y="450.0" class="dg-label--muted" font-size="9.5">伊甸園</text>
    <text x="187.0" y="413.8" class="dg-label" font-size="12">雙子座</text>
    <text x="187.0" y="427.8" class="dg-label--muted" font-size="9.5">大洪水</text>
    <text x="126.2" y="353.0" class="dg-label" font-size="12">金牛座</text>
    <text x="126.2" y="367.0" class="dg-label--muted" font-size="9.5">巴別塔</text>
    <text x="104.0" y="270.0" class="dg-label" font-size="12">白羊座</text>
    <text x="104.0" y="284.0" class="dg-label--muted" font-size="9.5">先知</text>
    <text x="126.2" y="187.0" class="dg-label" font-size="12">雙魚座</text>
    <text x="126.2" y="201.0" class="dg-label--muted" font-size="9.5">福音書</text>
    <text x="187.0" y="126.2" class="dg-label--accent" font-size="12" font-weight="600">水瓶座</text>
  </g>
  <g text-anchor="middle">
    <text x="326.2" y="63.4" class="dg-label--muted" font-size="8">公元前1.97萬年</text>
    <text x="423.4" y="119.6" class="dg-label--muted" font-size="8">公元前1.75萬年</text>
    <text x="479.6" y="216.8" class="dg-label--muted" font-size="8">公元前1.53萬年</text>
