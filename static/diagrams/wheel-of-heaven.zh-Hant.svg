    <text x="116.6" y="426.4" class="dg-label--muted" font-size="8">公元前4530年</text>
    <text x="60.4" y="329.2" class="dg-label--muted" font-size="8">公元前2370年</text>
    <text x="60.4" y="216.8" class="dg-label--muted" font-size="8">公元前210年</text>
    <text x="213.8" y="58.4" class="dg-label--muted" font-size="8">公元前2.18萬年</text>
    <text x="213.8" y="69.4" class="dg-label--muted" font-size="8">/ 公元4110年</text>
  </g>
  <circle cx="127.2" cy="127.2" r="5" class="dg-accent--fill"/>
  <text x="116.6" y="113.6" text-anchor="middle" class="dg-label--accent" font-size="10" font-weight="600">我們在此</text>
  <text x="116.6" y="125.6" text-anchor="middle" class="dg-label--accent" font-size="8.5">公元1950年</text>
  <path d="M 210.0 45.9 A 232 232 0 0 1 330.0 45.9" fill="none" class="dg-accent" stroke-width="1.6"/>
  <path d="M 337.8 48.1 L 319.3 38.2 L 317.2 48.0 Z" class="dg-accent--fill"/>
  <text x="270" y="16" text-anchor="middle" class="dg-label--muted" font-size="10.5">時代推進 →</text>
  <text x="270" y="257" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">天輪</text>
  <text x="270" y="287" text-anchor="middle" class="dg-label--muted" font-size="11">聯盟計畫的</text>
  <text x="270" y="301" text-anchor="middle" class="dg-label--muted" font-size="11">十二個時代</text>
  <text x="270" y="590" text-anchor="middle" class="dg-label--muted" font-size="11">每個時代 ≈ 2,160 年 · 完整一圈 ≈ 一個大年</text>
</svg>
