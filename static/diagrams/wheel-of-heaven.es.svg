    <text x="60.4" y="216.8" class="dg-label--muted" font-size="8">210 a. C.</text>
    <text x="213.8" y="58.4" class="dg-label--muted" font-size="8">21,8k a. C.</text>
    <text x="213.8" y="69.4" class="dg-label--muted" font-size="8">/ 4110 d. C.</text>
  </g>
  <circle cx="127.2" cy="127.2" r="5" class="dg-accent--fill"/>
  <text x="116.6" y="113.6" text-anchor="middle" class="dg-label--accent" font-size="10" font-weight="600">estamos aquí</text>
  <text x="116.6" y="125.6" text-anchor="middle" class="dg-label--accent" font-size="8.5">1950 d. C.</text>
  <path d="M 210.0 45.9 A 232 232 0 0 1 330.0 45.9" fill="none" class="dg-accent" stroke-width="1.6"/>
  <path d="M 337.8 48.1 L 319.3 38.2 L 317.2 48.0 Z" class="dg-accent--fill"/>
  <text x="270" y="16" text-anchor="middle" class="dg-label--muted" font-size="10.5">eras avanzan →</text>
  <text x="270" y="248" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">Wheel of</text>
  <text x="270" y="266" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">Heaven</text>
  <text x="270" y="287" text-anchor="middle" class="dg-label--muted" font-size="11">doce eras del</text>
  <text x="270" y="301" text-anchor="middle" class="dg-label--muted" font-size="11">proyecto de la alianza</text>
  <text x="270" y="590" text-anchor="middle" class="dg-label--muted" font-size="11">Cada era ≈ 2.160 años · una vuelta completa ≈ un Gran Año</text>
</svg>
