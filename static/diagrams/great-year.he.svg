  <title id="gy-t">השנה הגדולה כגלגל של שנים-עשר עידנים</title>
  <desc id="gy-d">מחזור הנקיפה בן ~25,772 השנים, מחולק לשנים-עשר עידנים של כ-2,160 שנה כל אחד, אחד לכל מזל. נקודת השוויון נעה לאחור דרך המזלות בקצב של כמעלה אחת כל 72 שנים, ומצויה כעת בגבול דגים–דלי, בכניסה לעידן הדלי.</desc>
