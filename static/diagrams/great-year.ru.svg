  <path d="M 300.3 31.5 L 321.3 31.1 L 318.8 40.7 Z" class="dg-accent--fill"/>
  <text x="300" y="34" text-anchor="middle" class="dg-label--muted" font-size="10.5">эпохи сменяются</text>
  <text x="260" y="240" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">Великий Год</text>
  <text x="260" y="262" text-anchor="middle" class="dg-label--muted" font-size="12">≈ 25 772 лет</text>
  <text x="260" y="284" text-anchor="middle" class="dg-label--muted" font-size="12">двенадцать эпох по</text>
  <text x="260" y="300" text-anchor="middle" class="dg-label--muted" font-size="12">~2 160 лет</text>
  <text x="260" y="538" text-anchor="middle" class="dg-label--muted" font-size="11">Одна эпоха = один Великий месяц = 30° прецессии ≈ 2 160 лет</text>
