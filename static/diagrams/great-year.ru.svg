<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-labelledby="gy-t gy-d">
  <title id="gy-t">Великий Год как колесо из двенадцати эпох</title>
  <desc id="gy-d">Прецессионный цикл длиной около 25 772 лет, разделённый на двенадцать эпох примерно по 2 160 лет каждая, по одной на знак зодиака. Точка весеннего равноденствия смещается вспять сквозь зодиак примерно на один градус каждые 72 года и сейчас находится на границе Рыб и Водолея, вступая в Эпоху Водолея.</desc>
  <circle cx="260" cy="260" r="206" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="260" cy="260" r="134" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="294.7" y1="130.6" x2="313.3" y2="61.0"/>
    <line x1="354.8" y1="165.2" x2="405.7" y2="114.3"/>
    <line x1="389.4" y1="225.3" x2="459.0" y2="206.7"/>
    <line x1="389.4" y1="294.7" x2="459.0" y2="313.3"/>
    <line x1="354.8" y1="354.8" x2="405.7" y2="405.7"/>
    <line x1="294.7" y1="389.4" x2="313.3" y2="459.0"/>
    <line x1="225.3" y1="389.4" x2="206.7" y2="459.0"/>
    <line x1="165.2" y1="354.8" x2="114.3" y2="405.7"/>
    <line x1="130.6" y1="294.7" x2="61.0" y2="313.3"/>
    <line x1="130.6" y1="225.3" x2="61.0" y2="206.7"/>
    <line x1="165.2" y1="165.2" x2="114.3" y2="114.3"/>
    <line x1="225.3" y1="130.6" x2="206.7" y2="61.0"/>
  </g>
  <g text-anchor="middle">
    <text x="260.0" y="94.0" class="dg-label" font-size="12.5">Овен</text>
    <text x="345.0" y="116.8" class="dg-label" font-size="12.5">Телец</text>
    <text x="407.2" y="179.0" class="dg-label" font-size="12.5">Близнецы</text>
    <text x="430.0" y="264.0" class="dg-label" font-size="12.5">Рак</text>
    <text x="407.2" y="349.0" class="dg-label" font-size="12.5">Лев</text>
    <text x="345.0" y="411.2" class="dg-label" font-size="12.5">Дева</text>
    <text x="260.0" y="434.0" class="dg-label" font-size="12.5">Весы</text>
    <text x="175.0" y="411.2" class="dg-label" font-size="12.5">Скорпион</text>
    <text x="112.8" y="349.0" class="dg-label" font-size="12.5">Стрелец</text>
    <text x="90.0" y="264.0" class="dg-label" font-size="12.5">Козерог</text>
    <text x="112.8" y="179.0" class="dg-label--accent" font-size="12.5" font-weight="600">Водолей</text>
    <text x="175.0" y="116.8" class="dg-label" font-size="12.5">Рыбы</text>
  </g>
  <line x1="260" y1="260" x2="168.1" y2="168.1" class="dg-accent" stroke-width="2"/>
  <circle cx="168.1" cy="168.1" r="5" class="dg-accent--fill"/>
  <text x="108" y="104" text-anchor="end" class="dg-label--accent" font-size="12.5">мы здесь</text>
