<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-labelledby="gy-t gy-d">
  <title id="gy-t">作为十二时代之轮的大年</title>
  <desc id="gy-d">约 25,772 年的岁差循环划分为十二个各约 2,160 年的时代，每个时代对应一个黄道星座。春分点以约每 72 年一度的速率沿黄道向后漂移，目前位于双鱼—水瓶交界，正进入水瓶座时代。</desc>
  <circle cx="260" cy="260" r="206" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="260" cy="260" r="134" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="294.7" y1="130.6" x2="313.3" y2="61.0"/>
    <line x1="354.8" y1="165.2" x2="405.7" y2="114.3"/>
    <line x1="389.4" y1="225.3" x2="459.0" y2="206.7"/>
    <line x1="389.4" y1="294.7" x2="459.0" y2="313.3"/>
    <line x1="354.8" y1="354.8" x2="405.7" y2="405.7"/>
    <line x1="294.7" y1="389.4" x2="313.3" y2="459.0"/>
    <line x1="225.3" y1="389.4" x2="206.7" y2="459.0"/>
    <line x1="165.2" y1="354.8" x2="114.3" y2="405.7"/>
    <line x1="130.6" y1="294.7" x2="61.0" y2="313.3"/>
    <line x1="130.6" y1="225.3" x2="61.0" y2="206.7"/>
    <line x1="165.2" y1="165.2" x2="114.3" y2="114.3"/>
    <line x1="225.3" y1="130.6" x2="206.7" y2="61.0"/>
  </g>
  <g text-anchor="middle">
    <text x="260.0" y="94.0" class="dg-label" font-size="12.5">白羊座</text>
    <text x="345.0" y="116.8" class="dg-label" font-size="12.5">金牛座</text>
    <text x="407.2" y="179.0" class="dg-label" font-size="12.5">双子座</text>
    <text x="430.0" y="264.0" class="dg-label" font-size="12.5">巨蟹座</text>
    <text x="407.2" y="349.0" class="dg-label" font-size="12.5">狮子座</text>
    <text x="345.0" y="411.2" class="dg-label" font-size="12.5">处女座</text>
    <text x="260.0" y="434.0" class="dg-label" font-size="12.5">天秤座</text>
    <text x="175.0" y="411.2" class="dg-label" font-size="12.5">天蝎座</text>
    <text x="112.8" y="349.0" class="dg-label" font-size="12.5">射手座</text>
    <text x="90.0" y="264.0" class="dg-label" font-size="12.5">摩羯座</text>
    <text x="112.8" y="179.0" class="dg-label--accent" font-size="12.5" font-weight="600">水瓶座</text>
    <text x="175.0" y="116.8" class="dg-label" font-size="12.5">双鱼座</text>
  </g>
  <line x1="260" y1="260" x2="168.1" y2="168.1" class="dg-accent" stroke-width="2"/>
  <circle cx="168.1" cy="168.1" r="5" class="dg-accent--fill"/>
  <text x="108" y="104" text-anchor="end" class="dg-label--accent" font-size="12.5">我们在此</text>
  <path d="M 421.2 93.1 A 232 232 0 0 0 308.2 33.1" fill="none" class="dg-accent" stroke-width="1.6"/>
  <path d="M 300.3 31.5 L 321.3 31.1 L 318.8 40.7 Z" class="dg-accent--fill"/>
  <text x="300" y="34" text-anchor="middle" class="dg-label--muted" font-size="10.5">时代推进</text>
  <text x="260" y="240" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">大年</text>
  <text x="260" y="262" text-anchor="middle" class="dg-label--muted" font-size="12">≈ 25,772 年</text>
  <text x="260" y="284" text-anchor="middle" class="dg-label--muted" font-size="12">十二个时代，每个</text>
  <text x="260" y="300" text-anchor="middle" class="dg-label--muted" font-size="12">约 2,160 年</text>
  <text x="260" y="538" text-anchor="middle" class="dg-label--muted" font-size="11">每个时代 = 一个大月 = 30° 岁差 ≈ 2,160 年</text>
</svg>
