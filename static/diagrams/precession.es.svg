<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" role="img" aria-labelledby="pr-t pr-d">
  <title id="pr-t">Precesión axial de la Tierra</title>
  <desc id="pr-d">El eje de rotación de la Tierra está inclinado 23,4 grados respecto a la normal a la eclíptica y describe lentamente un cono completo, de modo que el polo celeste norte traza un círculo contra las estrellas fijas — pasando por Thuban hacia el 2800 a. C., Polaris hoy y Vega hacia el 13.700 d. C.</desc>
  <g class="dg-label--muted" opacity="0.55">
    <circle cx="118" cy="58" r="1.6"/><circle cx="470" cy="44" r="1.4"/><circle cx="556" cy="120" r="1.7"/>
    <circle cx="602" cy="72" r="1.3"/><circle cx="92" cy="150" r="1.5"/><circle cx="516" cy="184" r="1.4"/><circle cx="150" cy="96" r="1.3"/>
  </g>
  <line x1="300" y1="340" x2="300" y2="60" class="dg-muted" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="300" y="48" text-anchor="middle" class="dg-label--muted" font-size="13">normal a la eclíptica</text>
  <ellipse cx="300" cy="110" rx="99" ry="34" fill="none" class="dg-accent" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M 305 141 L 315 146 L 305 151 Z" class="dg-accent--fill"/>
  <line x1="300" y1="340" x2="399" y2="113" class="dg-line" stroke-width="2.5"/>
  <text x="412" y="212" text-anchor="start" class="dg-label--muted" font-size="13">eje de rotación</text>
  <text x="412" y="228" text-anchor="start" class="dg-label--muted" font-size="13">de la Tierra</text>
  <path d="M 300 286 A 54 54 0 0 1 321.6 290.4" fill="none" class="dg-muted" stroke-width="1.4"/>
  <text x="330" y="300" text-anchor="start" class="dg-label" font-size="13">23.4°</text>
  <circle cx="300" cy="340" r="30" class="dg-line dg-surface" stroke-width="2"/>
  <ellipse cx="300" cy="340" rx="30" ry="9" fill="none" class="dg-muted" stroke-width="1.2" transform="rotate(23.4 300 340)"/>
  <circle cx="207" cy="122" r="4" class="dg-label"/>
  <text x="198" y="119" text-anchor="end" class="dg-label" font-size="14">Thuban</text>
  <text x="198" y="135" text-anchor="end" class="dg-label--muted" font-size="12">≈ 2800 a. C.</text>
  <circle cx="266" cy="78" r="4" class="dg-label"/>
  <text x="257" y="73" text-anchor="end" class="dg-label" font-size="14">Vega</text>
  <text x="257" y="89" text-anchor="end" class="dg-label--muted" font-size="12">≈ 13.700 d. C.</text>
  <circle cx="399" cy="113" r="5.5" class="dg-accent--fill"/>
  <text x="412" y="110" text-anchor="start" class="dg-label--accent" font-size="14">Polaris</text>
  <text x="412" y="126" text-anchor="start" class="dg-label--muted" font-size="12">estrella polar hoy</text>
</svg>
