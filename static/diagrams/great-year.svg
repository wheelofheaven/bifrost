<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-labelledby="gy-t gy-d">
  <title id="gy-t">The Great Year as a wheel of twelve Ages</title>
  <desc id="gy-d">The ~25,772-year precessional cycle divided into twelve Ages of about 2,160 years each, one per zodiac sign. The equinox drifts backward through the zodiac at roughly one degree every 72 years and currently sits at the Pisces–Aquarius boundary, entering the Age of Aquarius.</desc>
  <circle cx="260" cy="260" r="206" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="260" cy="260" r="134" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="294.7" y1="130.6" x2="313.3" y2="61.0"/>
    <line x1="354.8" y1="165.2" x2="405.7" y2="114.3"/>
    <line x1="389.4" y1="225.3" x2="459.0" y2="206.7"/>
    <line x1="389.4" y1="294.7" x2="459.0" y2="313.3"/>
    <line x1="354.8" y1="354.8" x2="405.7" y2="405.7"/>
    <line x1="294.7" y1="389.4" x2="313.3" y2="459.0"/>
    <line x1="225.3" y1="389.4" x2="206.7" y2="459.0"/>
    <line x1="165.2" y1="354.8" x2="114.3" y2="405.7"/>
    <line x1="130.6" y1="294.7" x2="61.0" y2="313.3"/>
    <line x1="130.6" y1="225.3" x2="61.0" y2="206.7"/>
    <line x1="165.2" y1="165.2" x2="114.3" y2="114.3"/>
    <line x1="225.3" y1="130.6" x2="206.7" y2="61.0"/>
  </g>
  <g text-anchor="middle">
    <text x="260.0" y="94.0" class="dg-label" font-size="12.5">Aries</text>
    <text x="345.0" y="116.8" class="dg-label" font-size="12.5">Taurus</text>
    <text x="407.2" y="179.0" class="dg-label" font-size="12.5">Gemini</text>
    <text x="430.0" y="264.0" class="dg-label" font-size="12.5">Cancer</text>
    <text x="407.2" y="349.0" class="dg-label" font-size="12.5">Leo</text>
    <text x="345.0" y="411.2" class="dg-label" font-size="12.5">Virgo</text>
    <text x="260.0" y="434.0" class="dg-label" font-size="12.5">Libra</text>
    <text x="175.0" y="411.2" class="dg-label" font-size="12.5">Scorpio</text>
    <text x="112.8" y="349.0" class="dg-label" font-size="12.5">Sagittarius</text>
    <text x="90.0" y="264.0" class="dg-label" font-size="12.5">Capricorn</text>
    <text x="112.8" y="179.0" class="dg-label--accent" font-size="12.5" font-weight="600">Aquarius</text>
    <text x="175.0" y="116.8" class="dg-label" font-size="12.5">Pisces</text>
  </g>
  <line x1="260" y1="260" x2="168.1" y2="168.1" class="dg-accent" stroke-width="2"/>
  <circle cx="168.1" cy="168.1" r="5" class="dg-accent--fill"/>
  <text x="108" y="104" text-anchor="end" class="dg-label--accent" font-size="12.5">we are here</text>
  <path d="M 421.2 93.1 A 232 232 0 0 0 308.2 33.1" fill="none" class="dg-accent" stroke-width="1.6"/>
  <path d="M 300.3 31.5 L 321.3 31.1 L 318.8 40.7 Z" class="dg-accent--fill"/>
  <text x="300" y="34" text-anchor="middle" class="dg-label--muted" font-size="10.5">Ages advance</text>
  <text x="260" y="240" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">The Great Year</text>
  <text x="260" y="262" text-anchor="middle" class="dg-label--muted" font-size="12">≈ 25,772 years</text>
  <text x="260" y="284" text-anchor="middle" class="dg-label--muted" font-size="12">twelve Ages of</text>
  <text x="260" y="300" text-anchor="middle" class="dg-label--muted" font-size="12">~2,160 years</text>
  <text x="260" y="538" text-anchor="middle" class="dg-label--muted" font-size="11">Each Age = one Great Month = 30° of precession ≈ 2,160 years</text>
</svg>
