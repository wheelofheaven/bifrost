  <text x="260" y="240" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">Das Große Jahr</text>
  <text x="260" y="262" text-anchor="middle" class="dg-label--muted" font-size="12">≈ 25.772 Jahre</text>
  <text x="260" y="284" text-anchor="middle" class="dg-label--muted" font-size="12">zwölf Zeitalter zu</text>
  <text x="260" y="300" text-anchor="middle" class="dg-label--muted" font-size="12">~2.160 Jahren</text>
  <text x="260" y="538" text-anchor="middle" class="dg-label--muted" font-size="11">Ein Zeitalter = ein Großer Monat = 30° Präzession ≈ 2.160 Jahre</text>
