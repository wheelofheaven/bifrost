    <text x="90.0" y="264.0" class="dg-label" font-size="12.5">Steinbock</text>
    <text x="112.8" y="179.0" class="dg-label--accent" font-size="12.5" font-weight="600">Wassermann</text>
    <text x="175.0" y="116.8" class="dg-label" font-size="12.5">Fische</text>
  </g>
  <line x1="260" y1="260" x2="168.1" y2="168.1" class="dg-accent" stroke-width="2"/>
