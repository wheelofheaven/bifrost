<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-labelledby="gy-t gy-d">
  <title id="gy-t">Das Große Jahr als Rad aus zwölf Zeitaltern</title>
  <desc id="gy-d">Der etwa 25.772 Jahre lange Präzessionszyklus, geteilt in zwölf Zeitalter von je rund 2.160 Jahren, eines je Tierkreiszeichen. Der Frühlingspunkt wandert rückläufig durch den Tierkreis, etwa ein Grad je 72 Jahre, und steht derzeit an der Grenze Fische–Wassermann, am Beginn des Wassermann-Zeitalters.</desc>
  <circle cx="260" cy="260" r="206" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="260" cy="260" r="134" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
