<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="wh-t wh-d">
  <title id="wh-t">גלגל השמיים — שנים-עשר עידני הנקיפה של הפרויקט</title>
  <desc id="wh-d">שנים-עשר עידני הנקיפה בני ~2,160 השנים נקראים כשלבים בפרויקט הברית, עם שנות הגבול מסומנות סביב השפה: מעידן הגדי (~21,810 לפנה״ס, פתיחת הפרויקט) דרך האריה (בריאת האדם), הסרטן (עדן), התאומים (המבול), השור (בבל), הטלה (הנביאים), הדגים (הבשורות), ועד עידן הדלי הנוכחי (מ-1950 לספירה).</desc>
