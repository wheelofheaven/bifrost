<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="wh-t wh-d">
  <title id="wh-t">Колесо Небес — двенадцать прецессионных эпох проекта</title>
  <desc id="wh-d">Двенадцать прецессионных эпох длиной около 2 160 лет прочитываются как фазы проекта альянса, с граничными годами по ободу: от Эпохи Козерога (~21 810 г. до н. э., начало проекта) через Льва (люди сотворены), Рака (Эдем), Близнецов (Потоп), Тельца (Вавилон), Овна (пророки), Рыб (Евангелия) до нынешней Эпохи Водолея (с 1950 г. н. э.).</desc>
