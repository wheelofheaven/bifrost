<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-labelledby="gy-t gy-d">
  <title id="gy-t">열두 시대의 바퀴로서의 대년</title>
  <desc id="gy-d">약 25,772년의 세차 주기를 각각 약 2,160년인 열두 시대로 나눈 것으로, 황도 12궁의 별자리마다 하나씩 대응합니다. 분점은 72년마다 약 1도씩 황도대를 거꾸로 이동하며, 현재 물고기자리–물병자리 경계에 있어 물병자리 시대로 진입하고 있습니다.</desc>
  <circle cx="260" cy="260" r="206" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="260" cy="260" r="134" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="294.7" y1="130.6" x2="313.3" y2="61.0"/>
    <line x1="354.8" y1="165.2" x2="405.7" y2="114.3"/>
    <line x1="389.4" y1="225.3" x2="459.0" y2="206.7"/>
    <line x1="389.4" y1="294.7" x2="459.0" y2="313.3"/>
    <line x1="354.8" y1="354.8" x2="405.7" y2="405.7"/>
    <line x1="294.7" y1="389.4" x2="313.3" y2="459.0"/>
    <line x1="225.3" y1="389.4" x2="206.7" y2="459.0"/>
    <line x1="165.2" y1="354.8" x2="114.3" y2="405.7"/>
    <line x1="130.6" y1="294.7" x2="61.0" y2="313.3"/>
    <line x1="130.6" y1="225.3" x2="61.0" y2="206.7"/>
    <line x1="165.2" y1="165.2" x2="114.3" y2="114.3"/>
    <line x1="225.3" y1="130.6" x2="206.7" y2="61.0"/>
  </g>
  <g text-anchor="middle">
    <text x="260.0" y="94.0" class="dg-label" font-size="12.5">양자리</text>
    <text x="345.0" y="116.8" class="dg-label" font-size="12.5">황소자리</text>
    <text x="407.2" y="179.0" class="dg-label" font-size="12.5">쌍둥이자리</text>
    <text x="430.0" y="264.0" class="dg-label" font-size="12.5">게자리</text>
    <text x="407.2" y="349.0" class="dg-label" font-size="12.5">사자자리</text>
    <text x="345.0" y="411.2" class="dg-label" font-size="12.5">처녀자리</text>
    <text x="260.0" y="434.0" class="dg-label" font-size="12.5">천칭자리</text>
    <text x="175.0" y="411.2" class="dg-label" font-size="12.5">전갈자리</text>
    <text x="112.8" y="349.0" class="dg-label" font-size="12.5">사수자리</text>
    <text x="90.0" y="264.0" class="dg-label" font-size="12.5">염소자리</text>
    <text x="112.8" y="179.0" class="dg-label--accent" font-size="12.5" font-weight="600">물병자리</text>
    <text x="175.0" y="116.8" class="dg-label" font-size="12.5">물고기자리</text>
  </g>
  <line x1="260" y1="260" x2="168.1" y2="168.1" class="dg-accent" stroke-width="2"/>
  <circle cx="168.1" cy="168.1" r="5" class="dg-accent--fill"/>
  <text x="108" y="104" text-anchor="end" class="dg-label--accent" font-size="12.5">현재 위치</text>
  <path d="M 421.2 93.1 A 232 232 0 0 0 308.2 33.1" fill="none" class="dg-accent" stroke-width="1.6"/>
  <path d="M 300.3 31.5 L 321.3 31.1 L 318.8 40.7 Z" class="dg-accent--fill"/>
  <text x="300" y="34" text-anchor="middle" class="dg-label--muted" font-size="10.5">시대 진행</text>
  <text x="260" y="240" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">대년</text>
  <text x="260" y="262" text-anchor="middle" class="dg-label--muted" font-size="12">≈ 25,772년</text>
  <text x="260" y="284" text-anchor="middle" class="dg-label--muted" font-size="12">열두 시대,</text>
  <text x="260" y="300" text-anchor="middle" class="dg-label--muted" font-size="12">각 약 2,160년</text>
  <text x="260" y="538" text-anchor="middle" class="dg-label--muted" font-size="11">각 시대 = 1대월 = 세차 30° ≈ 2,160년</text>
</svg>
