<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="wh-t wh-d">
  <title id="wh-t">Wheel of Heaven — douze ères précessionnelles du projet</title>
  <desc id="wh-d">Les douze ères précessionnelles d'environ 2 160 ans lues comme les phases du projet de l'alliance, avec les années-frontières indiquées sur le pourtour : de l'Ère du Capricorne (~21 810 av. J.-C., ouverture du projet) à travers le Lion (humains créés), le Cancer (Éden), les Gémeaux (le Déluge), le Taureau (Babel), le Bélier (les prophètes), les Poissons (les Évangiles), jusqu'à l'actuelle Ère du Verseau (à partir de 1950 apr. J.-C.).</desc>
  <circle cx="270" cy="270" r="202" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="270" cy="270" r="112" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="299.0" y1="161.8" x2="322.3" y2="74.9"/>
    <line x1="349.2" y1="190.8" x2="412.8" y2="127.2"/>
    <line x1="378.2" y1="241.0" x2="465.1" y2="217.7"/>
    <line x1="378.2" y1="299.0" x2="465.1" y2="322.3"/>
    <line x1="349.2" y1="349.2" x2="412.8" y2="412.8"/>
    <line x1="299.0" y1="378.2" x2="322.3" y2="465.1"/>
    <line x1="241.0" y1="378.2" x2="217.7" y2="465.1"/>
    <line x1="190.8" y1="349.2" x2="127.2" y2="412.8"/>
    <line x1="161.8" y1="299.0" x2="74.9" y2="322.3"/>
    <line x1="161.8" y1="241.0" x2="74.9" y2="217.7"/>
    <line x1="190.8" y1="190.8" x2="127.2" y2="127.2"/>
    <line x1="241.0" y1="161.8" x2="217.7" y2="74.9"/>
  </g>
  <g text-anchor="middle">
    <text x="270.0" y="104.0" class="dg-label" font-size="12">Capricorne</text>
    <text x="353.0" y="126.2" class="dg-label" font-size="12">Sagittaire</text>
    <text x="413.8" y="187.0" class="dg-label" font-size="12">Scorpion</text>
    <text x="436.0" y="270.0" class="dg-label" font-size="12">Balance</text>
    <text x="413.8" y="353.0" class="dg-label" font-size="12">Vierge</text>
    <text x="353.0" y="413.8" class="dg-label" font-size="12">Lion</text>
    <text x="353.0" y="427.8" class="dg-label--muted" font-size="9.5">humains créés</text>
    <text x="270.0" y="436.0" class="dg-label" font-size="12">Cancer</text>
    <text x="270.0" y="450.0" class="dg-label--muted" font-size="9.5">Éden</text>
    <text x="187.0" y="413.8" class="dg-label" font-size="12">Gémeaux</text>
    <text x="187.0" y="427.8" class="dg-label--muted" font-size="9.5">le Déluge</text>
    <text x="126.2" y="353.0" class="dg-label" font-size="12">Taureau</text>
    <text x="126.2" y="367.0" class="dg-label--muted" font-size="9.5">Babel</text>
    <text x="104.0" y="270.0" class="dg-label" font-size="12">Bélier</text>
    <text x="104.0" y="284.0" class="dg-label--muted" font-size="9.5">les prophètes</text>
    <text x="126.2" y="187.0" class="dg-label" font-size="12">Poissons</text>
    <text x="126.2" y="201.0" class="dg-label--muted" font-size="9.5">les Évangiles</text>
    <text x="187.0" y="126.2" class="dg-label--accent" font-size="12" font-weight="600">Verseau</text>
  </g>
  <g text-anchor="middle">
    <text x="326.2" y="63.4" class="dg-label--muted" font-size="8">19,7k av. J.-C.</text>
    <text x="423.4" y="119.6" class="dg-label--muted" font-size="8">17,5k av. J.-C.</text>
    <text x="479.6" y="216.8" class="dg-label--muted" font-size="8">15,3k av. J.-C.</text>
    <text x="479.6" y="329.2" class="dg-label--muted" font-size="8">13,2k av. J.-C.</text>
    <text x="423.4" y="426.4" class="dg-label--muted" font-size="8">11,0k av. J.-C.</text>
    <text x="326.2" y="482.6" class="dg-label--muted" font-size="8">8,85k av. J.-C.</text>
