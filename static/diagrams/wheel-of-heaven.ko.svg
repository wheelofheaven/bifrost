<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="wh-t wh-d">
  <title id="wh-t">Wheel of Heaven — 프로젝트의 열두 세차 시대</title>
  <desc id="wh-d">약 2,160년의 열두 세차 시대를 동맹의 프로젝트 국면으로 읽으며, 가장자리에 경계 연도를 표시합니다: 염소자리 시대(기원전 21,810년경, 프로젝트 개시)에서 시작해 사자자리(인류 창조), 게자리(에덴), 쌍둥이자리(대홍수), 황소자리(바벨), 양자리(예언자들), 물고기자리(복음서)를 거쳐 현재의 물병자리 시대(서기 1950년부터)에 이릅니다.</desc>
  <circle cx="270" cy="270" r="202" fill="none" class="dg-muted" stroke-width="1.5"/>
  <circle cx="270" cy="270" r="112" fill="none" class="dg-muted" stroke-width="1.5"/>
  <g class="dg-muted" stroke-width="1">
    <line x1="299.0" y1="161.8" x2="322.3" y2="74.9"/>
    <line x1="349.2" y1="190.8" x2="412.8" y2="127.2"/>
    <line x1="378.2" y1="241.0" x2="465.1" y2="217.7"/>
    <line x1="378.2" y1="299.0" x2="465.1" y2="322.3"/>
    <line x1="349.2" y1="349.2" x2="412.8" y2="412.8"/>
    <line x1="299.0" y1="378.2" x2="322.3" y2="465.1"/>
    <line x1="241.0" y1="378.2" x2="217.7" y2="465.1"/>
    <line x1="190.8" y1="349.2" x2="127.2" y2="412.8"/>
    <line x1="161.8" y1="299.0" x2="74.9" y2="322.3"/>
    <line x1="161.8" y1="241.0" x2="74.9" y2="217.7"/>
    <line x1="190.8" y1="190.8" x2="127.2" y2="127.2"/>
    <line x1="241.0" y1="161.8" x2="217.7" y2="74.9"/>
  </g>
  <g text-anchor="middle">
    <text x="270.0" y="104.0" class="dg-label" font-size="12">염소자리</text>
    <text x="353.0" y="126.2" class="dg-label" font-size="12">사수자리</text>
    <text x="413.8" y="187.0" class="dg-label" font-size="12">전갈자리</text>
    <text x="436.0" y="270.0" class="dg-label" font-size="12">천칭자리</text>
    <text x="413.8" y="353.0" class="dg-label" font-size="12">처녀자리</text>
    <text x="353.0" y="413.8" class="dg-label" font-size="12">사자자리</text>
    <text x="353.0" y="427.8" class="dg-label--muted" font-size="9.5">인류 창조</text>
    <text x="270.0" y="436.0" class="dg-label" font-size="12">게자리</text>
    <text x="270.0" y="450.0" class="dg-label--muted" font-size="9.5">에덴</text>
    <text x="187.0" y="413.8" class="dg-label" font-size="12">쌍둥이자리</text>
    <text x="187.0" y="427.8" class="dg-label--muted" font-size="9.5">대홍수</text>
    <text x="126.2" y="353.0" class="dg-label" font-size="12">황소자리</text>
    <text x="126.2" y="367.0" class="dg-label--muted" font-size="9.5">바벨</text>
    <text x="104.0" y="270.0" class="dg-label" font-size="12">양자리</text>
    <text x="104.0" y="284.0" class="dg-label--muted" font-size="9.5">예언자들</text>
    <text x="126.2" y="187.0" class="dg-label" font-size="12">물고기자리</text>
    <text x="126.2" y="201.0" class="dg-label--muted" font-size="9.5">복음서</text>
    <text x="187.0" y="126.2" class="dg-label--accent" font-size="12" font-weight="600">물병자리</text>
  </g>
  <g text-anchor="middle">
    <text x="326.2" y="63.4" class="dg-label--muted" font-size="8">기원전 19.7k</text>
    <text x="423.4" y="119.6" class="dg-label--muted" font-size="8">기원전 17.5k</text>
