    <text x="353.0" y="427.8" class="dg-label--muted" font-size="9.5">Menschen erschaffen</text>
    <text x="270.0" y="436.0" class="dg-label" font-size="12">Krebs</text>
    <text x="270.0" y="450.0" class="dg-label--muted" font-size="9.5">Eden</text>
    <text x="187.0" y="413.8" class="dg-label" font-size="12">Zwillinge</text>
    <text x="187.0" y="427.8" class="dg-label--muted" font-size="9.5">die Sintflut</text>
    <text x="126.2" y="353.0" class="dg-label" font-size="12">Stier</text>
    <text x="126.2" y="367.0" class="dg-label--muted" font-size="9.5">Babel</text>
    <text x="104.0" y="270.0" class="dg-label" font-size="12">Widder</text>
