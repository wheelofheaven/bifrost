<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600" role="img" aria-labelledby="wh-t wh-d">
  <title id="wh-t">Wheel of Heaven — zwölf Präzessionszeitalter des Projekts</title>
  <desc id="wh-d">Die zwölf rund 2.160 Jahre langen Präzessionszeitalter als Phasen des Projekts der Allianz, mit Grenzjahren am Rand: vom Steinbock-Zeitalter (~21.810 v. Chr., Projektbeginn) über Löwe (Menschen erschaffen), Krebs (Eden), Zwillinge (die Sintflut), Stier (Babel), Widder (die Propheten), Fische (die Evangelien) bis zum aktuellen Wassermann-Zeitalter (ab 1950 n. Chr.).</desc>
