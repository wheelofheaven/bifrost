<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-labelledby="gy-t gy-d">
  <title id="gy-t">El Gran Año como rueda de doce eras</title>
  <desc id="gy-d">El ciclo precesional de ~25.772 años dividido en doce eras de unos 2.160 años cada una, una por signo zodiacal. El equinoccio deriva hacia atrás a través del zodíaco a razón de aproximadamente un grado cada 72 años y se sitúa actualmente en la frontera Piscis–Acuario, entrando en la Era de Acuario.</desc>
