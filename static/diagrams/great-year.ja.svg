  <path d="M 300.3 31.5 L 321.3 31.1 L 318.8 40.7 Z" class="dg-accent--fill"/>
  <text x="300" y="34" text-anchor="middle" class="dg-label--muted" font-size="10.5">時代が進む</text>
  <text x="260" y="240" text-anchor="middle" class="dg-label" font-size="15" font-weight="600">大年</text>
  <text x="260" y="262" text-anchor="middle" class="dg-label--muted" font-size="12">≈ 25,772年</text>
  <text x="260" y="284" text-anchor="middle" class="dg-label--muted" font-size="12">十二の時代</text>
  <text x="260" y="300" text-anchor="middle" class="dg-label--muted" font-size="12">各約2,160年</text>
  <text x="260" y="538" text-anchor="middle" class="dg-label--muted" font-size="11">各時代 = 一つの大月 = 歳差30° ≈ 2,160年</text>
