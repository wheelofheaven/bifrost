<script>
    // Theme initialization — runs immediately to prevent flash of incorrect
    // theme. Dark is the project's canonical default; the OS
    // `prefers-color-scheme` hint is intentionally ignored on first visit.
    // Users who toggle to light get their choice persisted in localStorage
    // and respected on return.
    (function () {
        const html = document.documentElement;
        const savedTheme = localStorage.getItem("theme");
        const effectiveTheme = savedTheme === "light" ? "light" : "dark";
        html.setAttribute("data-theme", effectiveTheme);
    })();
</script>
