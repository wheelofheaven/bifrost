<!-- Listen Button - Trigger -->
<button
    class="listen-trigger"
    id="listenTrigger"
    aria-label="{{ trans(key='listenToPage', lang=detected_lang) }}"
    title="{{ trans(key='listenToPage', lang=detected_lang) }}"
>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    <span>{{ trans(key="listenLabel", lang=detected_lang) }}</span>
</button>

<!-- Audio Player — fixed bottom bar. Two states:
     • Collapsed (default): a compact row — the play button (with a
       progress ring that fills as the track plays) plus the title and
       subtitle. Progress is read at a glance from the ring.
     • Expanded (tap the meta area): the bar grows UPWARD, revealing a
       panel with a tactile scrubber (draggable) and secondary actions
       (chapter jump, cinematic view).
     Every id below is consumed by listen-button.js. -->
<div class="audio-player" id="audioPlayer" aria-hidden="true" inert
     data-label-play="{{ trans(key='audioPlay', lang=detected_lang) }}"
     data-label-pause="{{ trans(key='audioPause', lang=detected_lang) }}"
     data-label-this-page="{{ trans(key='audioThisPage', lang=detected_lang) }}">

    <!-- Expanded panel — collapsed to zero height until the bar is tapped,
         then grows upward above the compact bar. -->
    <div class="audio-player__panel" id="audioPanel">
        <!-- Tactile scrubber: current time · draggable progress · total. -->
        <div class="audio-player__scrubber">
            <span class="audio-player__time audio-player__time--current" id="audioTimeCurrent">0:00</span>
            <div class="audio-player__progress" id="audioProgress" role="slider" aria-label="{{ trans(key='audioPlay', lang=detected_lang) }}" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
                <div class="audio-player__progress-bg"></div>
                <div class="audio-player__progress-fill" id="audioProgressFill"></div>
                <div class="audio-player__progress-handle" id="audioProgressHandle"></div>
            </div>
            <span class="audio-player__time audio-player__time--total" id="audioTimeTotal">0:00</span>
        </div>

        <!-- Secondary actions. Each is revealed only when relevant: chapter
             jump on multi-chapter books, cinematic on prerecorded audio. -->
        <div class="audio-player__actions">
            <button class="audio-player__action audio-player__action--chapters" id="audioChaptersBtn" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Chapters" title="Chapters">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                    <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
            </button>
            <button class="audio-player__cinematic-toggle" id="audioCinematicToggle" type="button" aria-label="Open cinematic view" title="Cinematic view">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M7 4v16M17 4v16M2 9h5M2 15h5M17 9h5M17 15h5"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Compact bar — always visible. -->
    <div class="audio-player__bar">
        <!-- Play/Pause — with a progress ring (--progress 0..100, set by
             listen-button.js) that fills clockwise as the audio plays. -->
        <button class="audio-player__play" id="audioPlayPause" aria-label="{{ trans(key='audioPlay', lang=detected_lang) }}">
            <svg class="audio-player__play-ring" viewBox="0 0 100 100" aria-hidden="true">
                <circle class="audio-player__play-ring-track" cx="50" cy="50" r="48" pathLength="100"/>
                <circle class="audio-player__play-ring-fill" cx="50" cy="50" r="48" pathLength="100"/>
            </svg>
            <span class="audio-player__icon audio-player__icon--play">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
            </span>
            <span class="audio-player__icon audio-player__icon--pause">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="4" width="4" height="16"/>
                    <rect x="14" y="4" width="4" height="16"/>
                </svg>
            </span>
        </button>

        <!-- Meta — title over subtitle, both visible. The whole area is the
             expand/collapse toggle; the chevron flips when open. -->
        <button class="audio-player__meta" id="audioExpandToggle" type="button" aria-expanded="false" aria-controls="audioPanel" aria-label="Expand player">
            <span class="audio-player__title-stack">
                <span class="audio-player__title-row audio-player__title-row--book is-active">
                    <span class="audio-player__title-text"></span>
                </span>
                <span class="audio-player__title-row audio-player__title-row--chapter">
                    <span class="audio-player__chapter-text"></span>
                </span>
            </span>
            <span class="audio-player__chevron" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15"/>
                </svg>
            </span>
        </button>

        <!-- Close -->
        <button class="audio-player__close" id="audioClose" aria-label="{{ trans(key='audioStop', lang=detected_lang) }}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Chapter jump overlay — populated at runtime from the manifest,
         anchored above the player. -->
    <div class="audio-player__chapter-menu" id="audioChapterMenu" role="menu" aria-hidden="true" hidden></div>

    <!-- Loading overlay (shown while studio model downloads / warms up) -->
    <div class="audio-player__loading" id="audioLoading" aria-live="polite">
        <span class="audio-player__loading-spinner" aria-hidden="true"></span>
        <span class="audio-player__loading-label" id="audioLoadingLabel">Loading…</span>
    </div>
</div>

<!-- Cinematic view overlay (v5) — fullscreen scene slideshow + current
     sentence as a caption, driven by listen-button.js against the
     c{n}.cinematic.json sidecar. Hidden until opened from the player bar.
     Two stacked background layers crossfade between scenes. -->
<div class="cinematic" id="cinematicView" aria-hidden="true" inert role="dialog" aria-label="Cinematic view">
    <div class="cinematic__stage" aria-hidden="true">
        <div class="cinematic__bg cinematic__bg--fallback" data-layer="a"></div>
        <div class="cinematic__bg cinematic__bg--fallback" data-layer="b"></div>
        <div class="cinematic__scrim"></div>
        <div class="cinematic__vignette"></div>
    </div>

    <!-- Persistent brand watermark (top-left) — stays put while the controls
         auto-hide, so it reads as a channel bug and shows in recordings. -->
    <div class="cinematic__brand" aria-label="Wheel of Heaven">
        <span class="cinematic__brandmark">{% include "partials/brand/logomark.html" %}</span>
        <span class="cinematic__brandtype">{% include "partials/brand/wordmark.html" %}</span>
    </div>

    <div class="cinematic__caption" id="cinematicCaption" aria-live="polite">
        <span class="cinematic__speaker" id="cinematicSpeaker" hidden></span>
        <p class="cinematic__text" id="cinematicText"></p>
    </div>

    <!-- Top bar — exit only. Auto-hides with the play bar on inactivity. -->
    <div class="cinematic__topbar">
        <button class="cinematic__btn cinematic__btn--exit" id="cinematicExit" type="button" aria-label="Exit cinematic view">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Play bar — play/pause + seekable progress. Revealed on pointer move
         or touch, auto-hidden after inactivity while playing. -->
    <div class="cinematic__bar" id="cinematicBar">
        <button class="cinematic__btn cinematic__btn--play" id="cinematicPlayPause" type="button" aria-label="Play">
            <span class="cinematic__icon cinematic__icon--play">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </span>
            <span class="cinematic__icon cinematic__icon--pause">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </span>
        </button>
        <span class="cinematic__time" id="cinematicTimeCurrent">0:00</span>
        <div class="cinematic__progress" id="cinematicProgress" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="cinematic__progress-bg"></div>
            <div class="cinematic__progress-fill" id="cinematicProgressFill"></div>
            <div class="cinematic__progress-handle" id="cinematicProgressHandle"></div>
        </div>
        <span class="cinematic__time" id="cinematicTimeTotal">0:00</span>
    </div>
</div>
