<!-- Glossary Tooltip - Shows wiki definitions on hover. -->
<!-- Renders the section glyph via the partials/section-icon.html helper
     (caller sets `slug`, helper resolves through data/icons.json). The
     partial pattern is used here because base.html includes this partial
     and we can't rely on every page having section_icons imported. -->
<div class="glossary-tooltip" id="glossaryTooltip" role="tooltip" aria-hidden="true"
     data-label-loading="{{ trans(key='glossaryLoading', lang=detected_lang) }}"
     data-label-none="{{ trans(key='glossaryNoDefinition', lang=detected_lang) }}">
    <div class="glossary-tooltip__content">
        <div class="glossary-tooltip__header">
            <span class="glossary-tooltip__term" id="glossaryTerm"></span>
            <span class="glossary-tooltip__badge">
                <span class="glossary-tooltip__badge-icon" aria-hidden="true">{% set slug = "wiki" %}{% include "partials/section-icon.html" %}</span>
                {{ trans(key="navbarWiki", lang=detected_lang) }}
            </span>
        </div>
        <p class="glossary-tooltip__definition" id="glossaryDefinition"></p>
        <a class="glossary-tooltip__hint" id="glossaryHint" href="#">{{ trans(key="glossaryClickHint", lang=detected_lang) }}</a>
    </div>
    <div class="glossary-tooltip__arrow"></div>
</div>

<script>
(function() {
    const tooltip = document.getElementById('glossaryTooltip');
    const termEl = document.getElementById('glossaryTerm');
    const defEl = document.getElementById('glossaryDefinition');
    const hintEl = document.getElementById('glossaryHint');

    if (!tooltip) return;

    // Cache for fetched definitions
    const definitionCache = new Map();

    // Attach tooltips to every wiki link on the page, except those inside
    // chrome / navigational regions where a definition popup would be noise.
    // Read Next cards, the navbar, footer, breadcrumbs, the wiki sidebar
    // (TOC + page header) and the Read landing tiles are all excluded.
    const excludeSelector = [
        '.related-content',
        '.navbar',
        '.navbar-dropdown',
        '.footer',
        '.breadcrumbs',
        '.wiki__sidebar',
        '.read__cards',
        '.read__sublinks',
        // The /wiki/ overview itself — every card already links to its
        // own entry, so a hover-preview tooltip on top of that is noise.
        '.wiki-section',
    ].join(',');

    // Derive the canonical site origin from <link rel="canonical">, which
    // Zola sets per-page. In dev (served on 127.0.0.1) this is still the
    // production origin (e.g. https://www.wheelofheaven.world), so any
    // absolute URL emitted by Zola's get_url() will match it. We accept
    // links whose origin is EITHER the current page's origin (relative
    // links, dev-server URLs) OR the canonical site origin (absolute URLs
    // baked from config.base_url). Anything else (e.g. wikipedia.org/wiki/…)
    // gets skipped.
    let canonicalOrigin = '';
    const _canonEl = document.querySelector('link[rel="canonical"]');
    if (_canonEl) {
        try { canonicalOrigin = new URL(_canonEl.href).origin; } catch (_) {}
    }

    function isInCorpus(link) {
        let parsed;
        try { parsed = new URL(link.getAttribute('href') || '', window.location.href); }
        catch (_) { return false; }
        if (parsed.origin !== window.location.origin
            && (!canonicalOrigin || parsed.origin !== canonicalOrigin)) {
            return false;
        }
        // Pathname-based wiki check: matches /wiki/<slug> and /<lang>/wiki/<slug>.
        return /\/wiki\/[^\/]+/.test(parsed.pathname);
    }

    document.querySelectorAll('a[href*="/wiki/"]').forEach(link => {
        // Skip the current page
        if (link.href === window.location.href) return;
        // In-corpus check (replaces the legacy hostname-includes check
        // that broke for absolute URLs to the production domain in dev).
        if (!isInCorpus(link)) return;
        // Skip excluded ancestors (Read Next cards, navbar, footer, etc.)
        if (link.closest(excludeSelector)) return;

        link.classList.add('glossary-term');
        link.setAttribute('data-glossary', 'true');

        link.addEventListener('mouseenter', handleMouseEnter);
        link.addEventListener('mouseleave', handleMouseLeave);
        link.addEventListener('focus', handleMouseEnter);
        link.addEventListener('blur', handleMouseLeave);
    });

    let hideTimeout;
    let currentLink = null;

    // Resolve the best-available term label for a wiki link. The link text
    // itself is often "Read more" (on wiki cards) or a clipped phrase, so
    // we walk up to a nearby titled container and use its title instead.
    // Falls back to link.textContent when no better label is available.
    function resolveTerm(link) {
        const card = link.closest(
            '.wiki-card, .explainer-card, .timeline-card, .library-card, .news-card, article'
        );
        if (card) {
            const titleEl = card.querySelector(
                '.wiki-card__title, .wiki-card__link, .explainer-card__title, ' +
                '.timeline-card__title, .library-card__title, .news-card__title, ' +
                'h1, h2, h3'
            );
            if (titleEl) {
                const t = titleEl.textContent.trim();
                if (t) return t;
            }
        }
        return link.textContent.trim();
    }

    async function handleMouseEnter(e) {
        clearTimeout(hideTimeout);
        const link = e.currentTarget;
        currentLink = link;

        const href = link.getAttribute('href');

        // Show loading state with the best label we have locally.
        termEl.textContent = resolveTerm(link);
        defEl.textContent = tooltip.dataset.labelLoading || 'Loading...';
        if (hintEl) hintEl.setAttribute('href', href);
        positionTooltip(link);
        showTooltip();

        // Fetch canonical title + definition from the target page.
        const entry = await getEntry(href);

        // Only update if still hovering same link
        if (currentLink === link) {
            if (entry && entry.title) termEl.textContent = entry.title;
            defEl.textContent = (entry && entry.definition) || tooltip.dataset.labelNone || 'No definition available.';
        }
    }

    function handleMouseLeave() {
        hideTimeout = setTimeout(() => {
            hideTooltip();
            currentLink = null;
        }, 150);
    }

    // Keep tooltip visible when hovering over it
    tooltip.addEventListener('mouseenter', () => {
        clearTimeout(hideTimeout);
    });

    tooltip.addEventListener('mouseleave', () => {
        hideTimeout = setTimeout(() => {
            hideTooltip();
            currentLink = null;
        }, 150);
    });

    async function getEntry(href) {
        // Normalize href
        const url = new URL(href, window.location.origin);
        let path = url.pathname;

        // Handle old URL format: /wiki/encyclopedia/slug/ -> /wiki/slug/
        if (path.includes('/wiki/encyclopedia/')) {
            path = path.replace('/wiki/encyclopedia/', '/wiki/');
        }

        // Check cache
        if (definitionCache.has(path)) {
            return definitionCache.get(path);
        }

        try {
            const response = await fetch(path);
            if (!response.ok) throw new Error('Failed to fetch');

            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // Title: prefer og:title (clean), then the page h1, then <title>.
            let title = '';
            const ogTitle = doc.querySelector('meta[property="og:title"]');
            if (ogTitle) title = (ogTitle.getAttribute('content') || '').trim();
            if (!title) {
                const h1 = doc.querySelector('h1');
                if (h1) title = h1.textContent.trim();
            }
            if (!title && doc.title) {
                // Strip trailing " | Site Name" / " — Site Name" suffix.
                title = doc.title.replace(/\s*[|—–-]\s*[^|—–-]+$/, '').trim();
            }

            // Definition
            let definition = '';
            const metaDesc = doc.querySelector('meta[name="description"]');
            if (metaDesc) definition = metaDesc.getAttribute('content');
            if (!definition) {
                const aiSummary = doc.querySelector('meta[name="ai.summary"]');
                if (aiSummary) definition = aiSummary.getAttribute('content');
            }
            if (!definition) {
                const summary = doc.querySelector('.wiki__summary-content, .wiki__tldr, [data-ai-summary]');
                if (summary) definition = summary.textContent.trim();
            }
            if (definition && definition.length > 200) {
                definition = definition.substring(0, 197) + '...';
            }

            const entry = { title, definition };
            definitionCache.set(path, entry);
            return entry;

        } catch (err) {
            console.warn('Failed to fetch definition:', err);
            definitionCache.set(path, null);
            return null;
        }
    }

    function positionTooltip(link) {
        const linkRect = link.getBoundingClientRect();
        const tooltipHeight = 120; // Approximate tooltip height
        const padding = 10;

        // Position below the link by default
        let top = linkRect.bottom + padding;
        let left = linkRect.left + (linkRect.width / 2);

        // Check if tooltip would go below viewport
        if (top + tooltipHeight > window.innerHeight - padding) {
            // Position above instead
            top = linkRect.top - padding;
            tooltip.classList.remove('glossary-tooltip--bottom');
        } else {
            tooltip.classList.add('glossary-tooltip--bottom');
        }

        // Adjust horizontal position to stay in viewport
        const tooltipWidth = 300; // max-width from CSS
        if (left - tooltipWidth / 2 < padding) {
            left = tooltipWidth / 2 + padding;
        } else if (left + tooltipWidth / 2 > window.innerWidth - padding) {
            left = window.innerWidth - tooltipWidth / 2 - padding;
        }

        tooltip.style.top = `${top + window.scrollY}px`;
        tooltip.style.left = `${left}px`;
    }

    function showTooltip() {
        tooltip.classList.add('glossary-tooltip--visible');
        tooltip.setAttribute('aria-hidden', 'false');
    }

    function hideTooltip() {
        tooltip.classList.remove('glossary-tooltip--visible');
        tooltip.setAttribute('aria-hidden', 'true');
    }

    // Hide on scroll (optional, can be removed for sticky behavior)
    let scrollTimeout;
    window.addEventListener('scroll', () => {
        if (tooltip.classList.contains('glossary-tooltip--visible')) {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                if (currentLink) {
                    positionTooltip(currentLink);
                }
            }, 50);
        }
    }, { passive: true });

    // Hide on escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && tooltip.classList.contains('glossary-tooltip--visible')) {
            hideTooltip();
            currentLink = null;
        }
    });
})();
</script>
